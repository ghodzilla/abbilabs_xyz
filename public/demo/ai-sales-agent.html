<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sales Agent — Live Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
    }
    .window {
      max-width: 820px;
      margin: 0 auto;
      background: #161b22;
      min-height: 100vh;
      border-left: 1px solid #30363d;
      border-right: 1px solid #30363d;
    }
    .titlebar {
      background: #21262d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar-label { margin-left: 8px; color: #8b949e; font-size: 12px; }
    .btn {
      margin-left: auto;
      border: none;
      border-radius: 6px;
      padding: 5px 16px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .btn-play    { background: #238636; color: #fff; }
    .btn-play:hover { background: #2ea043; }
    .btn-restart { background: #30363d; color: #e6edf3; display: none; }
    .btn-restart:hover { background: #3d444e; }

    /* Start screen */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      padding: 40px 28px;
      text-align: center;
      gap: 24px;
    }
    #start-screen h1 { color: #e6edf3; font-size: 1.5rem; font-weight: 700; }
    #start-screen p  { color: #8b949e; font-size: 0.875rem; line-height: 1.8; max-width: 480px; }
    .play-big {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 40px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .play-big:hover { background: #2ea043; }
    .duration-hint { color: #6e7681; font-size: 0.8rem; }

    /* Terminal */
    .terminal {
      padding: 24px 28px 48px;
      display: none;
    }
    .line { display: block; white-space: pre-wrap; word-break: break-word; }
    .line.dim    { color: #8b949e; }
    .line.green  { color: #3fb950; }
    .line.yellow { color: #e3b341; }
    .line.blue   { color: #58a6ff; }
    .line.red    { color: #f85149; }
    .line.white  { color: #e6edf3; }
    .line.gray   { color: #6e7681; }
    .line.bold   { font-weight: 700; }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: #e6edf3;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Audio controls */
    .audio-bar {
      display: none;
      align-items: center;
      gap: 12px;
      background: #21262d;
      border-top: 1px solid #30363d;
      padding: 10px 16px;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 820px;
    }
    .audio-label { color: #8b949e; font-size: 11px; flex-shrink: 0; }
    .audio-progress { flex: 1; height: 4px; background: #30363d; border-radius: 2px; }
    .audio-fill { height: 100%; background: #238636; border-radius: 2px; width: 0%; transition: width 0.5s linear; }
    .audio-time { color: #6e7681; font-size: 11px; flex-shrink: 0; }
    .mute-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 14px; flex-shrink: 0; }
  </style>
</head>

let animTimer = null;
let muted = false;

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
function fmtTime(s) { return pad(s / 60) + ':' + pad(s % 60); }

function toggleMute() {
  const audio = document.getElementById('audio');
  muted = !muted;
  audio.muted = muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}

function startDemo() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('terminal').style.display = 'block';
  document.getElementById('audioBar').style.display = 'flex';
  document.getElementById('restartBtn').style.display = 'block';

  const audio = document.getElementById('audio');
  audio.currentTime = 0;
  audio.play().catch(() => {});

  audio.addEventListener('timeupdate', function() {
    const pct = (audio.currentTime / audio.duration * 100) || 0;
    document.getElementById('audioFill').style.width = pct + '%';
    document.getElementById('audioTime').textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration || 0);
  });

  // Terminal starts after 30s (Part 1 voiceover = showing HubSpot)
  animTimer = setTimeout(() => runAnimation(), 30000);
}

function runAnimation() {
  const term = document.getElementById('terminal');
  term.innerHTML = '';
  const total = LINES.length;
  let i = 0;

  function next() {
    if (i >= total) {
      const cur = document.getElementById('cursor');
      if (cur) cur.remove();
      return;
    }
    const { text, cls, delay } = LINES[i];

    const cur = document.getElementById('cursor');
    if (cur) cur.remove();

    const span = document.createElement('span');
    span.className = 'line' + (cls ? ' ' + cls : '');
    span.textContent = text;
    term.appendChild(span);
    term.appendChild(document.createElement('br'));

    const cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    cursorEl.id = 'cursor';
    term.appendChild(cursorEl);
    cursorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    i++;
    animTimer = setTimeout(next, delay || 30);
  }
  next();
}

function restart() {
  clearTimeout(animTimer);
  const audio = document.getElementById('audio');
  audio.pause();
  audio.currentTime = 0;
  document.getElementById('terminal').innerHTML = '';
  document.getElementById('audioFill').style.width = '0%';
  document.getElementById('audioTime').textContent = '0:00';

  audio.play().catch(() => {});
  animTimer = setTimeout(() => runAnimation(), 30000);
}
</script>
