      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      position: sticky;
      top: 0;
      z-index: 10;

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }
    .titlebar-label {
      margin-left: 8px;
      color: #8b949e;
      font-size: 12px;
    }
    .restart-btn {
      margin-left: auto;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .restart-btn:hover { background: #2ea043; }
    .terminal {
      padding: 24px 28px 48px;
      min-height: calc(100vh - 48px);
    }
    .line { display: block; white-space: pre-wrap; word-break: break-word; }
    .line.dim      { color: #8b949e; }
    .line.green    { color: #3fb950; }
    .line.yellow   { color: #e3b341; }
    .line.blue     { color: #58a6ff; }
    .line.red      { color: #f85149; }
    .line.orange   { color: #ffa657; }
    .line.white    { color: #e6edf3; }
    .line.gray     { color: #6e7681; }
    .line.bold     { font-weight: 700; }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: #e6edf3;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #21262d;
    }
    .progress-bar {
      height: 100%;
      background: #238636;
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>

let timer = null;

function restart() {
  if (timer) clearTimeout(timer);
  const term = document.getElementById('terminal');
  term.innerHTML = '<span class="cursor" id="cursor"></span>';
  document.getElementById('progress').style.width = '0%';
  run();
}

function run() {
  const term = document.getElementById('terminal');
  const total = LINES.length;
  let i = 0;

  function next() {
    if (i >= total) {
      // move cursor after last line
      const cur = document.getElementById('cursor');
      if (cur) cur.remove();
      const last = term.lastElementChild;
      if (last) last.insertAdjacentHTML('afterend', '<span class="cursor" id="cursor"></span>');
      return;
    }

    const { text, cls, delay } = LINES[i];

    // remove cursor, add line, re-add cursor
    const cur = document.getElementById('cursor');
    if (cur) cur.remove();

    const span = document.createElement('span');
    span.className = 'line' + (cls ? ' ' + cls : '');
    span.textContent = text;
    term.appendChild(span);
    term.appendChild(document.createElement('br'));

    const cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    cursorEl.id = 'cursor';
    term.appendChild(cursorEl);

    // scroll into view
    cursorEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // progress bar
    document.getElementById('progress').style.width = ((i + 1) / total * 100) + '%';

    i++;
    timer = setTimeout(next, delay || 30);
  }

  next();
}

window.addEventListener('load', run);
