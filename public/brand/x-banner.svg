<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bannerBg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="1350" cy="80" r="180" fill="white" opacity="0.04"/>
  <circle cx="1400" cy="420" r="120" fill="white" opacity="0.04"/>
  <circle cx="100" cy="400" r="150" fill="white" opacity="0.04"/>
  
  <!-- Main text -->
  <text x="120" y="200" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="110" fill="white" letter-spacing="-1">Abbi Labs</text>
  
  <!-- Tagline -->
  <text x="124" y="275" font-family="'Arial', sans-serif" font-weight="400" font-size="42" fill="white" opacity="0.8">AI Agent Templates for Business</text>
  
  <!-- URL pill -->
  <rect x="120" y="320" width="320" height="60" rx="30" ry="30" fill="white" opacity="0.2"/>
  <text x="280" y="360" font-family="'Arial', sans-serif" font-weight="600" font-size="30" fill="white" text-anchor="middle">abbilabs.xyz</text>
  
  <!-- Small robot icon top right area -->
  <rect x="1100" y="100" width="260" height="280" rx="40" ry="40" fill="white" opacity="0.1"/>
  <rect x="1130" y="160" width="200" height="160" rx="24" ry="24" fill="white" opacity="0.15"/>
  <rect x="1155" y="195" width="56" height="50" rx="14" ry="14" fill="white" opacity="0.6"/>
  <rect x="1249" y="195" width="56" height="50" rx="14" ry="14" fill="white" opacity="0.6"/>
  <rect x="1165" y="275" width="130" height="12" rx="6" ry="6" fill="white" opacity="0.3"/>
  <rect x="1218" y="108" width="18" height="64" rx="9" ry="9" fill="white" opacity="0.5"/>
  <circle cx="1227" cy="100" r="22" fill="white" opacity="0.5"/>
</svg>