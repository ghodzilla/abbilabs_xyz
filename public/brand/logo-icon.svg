<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="800" height="800" rx="160" ry="160" fill="url(#bg)"/>
  
  <!-- Robot face / AI icon -->
  <!-- Head -->
  <rect x="220" y="220" width="360" height="300" rx="40" ry="40" fill="white" opacity="0.95"/>
  
  <!-- Eyes -->
  <rect x="290" y="300" width="80" height="70" rx="20" ry="20" fill="#1d4ed8"/>
  <rect x="430" y="300" width="80" height="70" rx="20" ry="20" fill="#1d4ed8"/>
  
  <!-- Eye shine -->
  <circle cx="315" cy="320" r="12" fill="white" opacity="0.6"/>
  <circle cx="455" cy="320" r="12" fill="white" opacity="0.6"/>
  
  <!-- Mouth -->
  <rect x="300" y="410" width="200" height="16" rx="8" ry="8" fill="#1d4ed8" opacity="0.5"/>
  
  <!-- Antenna -->
  <rect x="388" y="140" width="24" height="90" rx="12" ry="12" fill="white" opacity="0.9"/>
  <circle cx="400" cy="130" r="28" fill="white" opacity="0.9"/>
  <circle cx="400" cy="130" r="16" fill="#1d4ed8"/>
  
  <!-- Text: ABBI LABS -->
  <text x="400" y="620" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="88" fill="white" text-anchor="middle" letter-spacing="4">ABBI LABS</text>
</svg>